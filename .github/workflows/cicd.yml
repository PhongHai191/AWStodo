name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Validate structure
        run: |
          set -e
          test -d backend || (echo "backend missing" && exit 1)
          test -d frontend || (echo "frontend missing" && exit 1)
          test -f docker-compose.yml || (echo "docker-compose.yml missing" && exit 1)

      - name: Install backend deps
        run: |
          cd backend
          npm ci

  cd:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔐 OIDC
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActions
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Test AWS identity
        run: aws sts get-caller-identity

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 🐳 Build & Push backend
      - name: Build & Push backend
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/awstodo-backend
          docker build -t $IMAGE:${{ github.sha }} ./backend
          docker push $IMAGE:${{ github.sha }}

      # 🐳 Build & Push nginx
      - name: Build & Push nginx
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/awstodo-nginx
          docker build -t $IMAGE:${{ github.sha }} ./frontend
          docker push $IMAGE:${{ github.sha }}

      # 📦 Upload docker-compose (version + latest)
      - name: Upload compose to S3 (versioned)
        run: |
          BUCKET=${{ secrets.S3_BUCKET }}

          aws s3 cp docker-compose.yml \
            s3://$BUCKET/deploy/docker-compose-${{ github.sha }}.yml

          aws s3 cp docker-compose.yml \
            s3://$BUCKET/deploy/docker-compose.yml

      # 🚀 Deploy via SSM
      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.WEBSERVER1ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy todo app" \
            --parameters '{
              "commands": [
                "set -e",
                "mkdir -p /home/ec2-user/AWStodo",
                "cd /home/ec2-user/AWStodo",

                "aws s3 cp s3://${{ secrets.S3_BUCKET }}/deploy/docker-compose.yml docker-compose.yml",

                "rm -f .env",

                "echo DB_NAME=$(aws ssm get-parameter --name /todoapp/DB_NAME --with-decryption --query Parameter.Value --output text) >> .env",
                "echo AWS_S3_BUCKET=$(aws ssm get-parameter --name /todoapp/AWS_S3_BUCKET --with-decryption --query Parameter.Value --output text) >> .env",
                "echo JWT_ACCESS_SECRET=$(aws ssm get-parameter --name /todoapp/JWT_ACCESS_SECRET --with-decryption --query Parameter.Value --output text) >> .env",
                "echo JWT_REFRESH_SECRET=$(aws ssm get-parameter --name /todoapp/JWT_REFRESH_SECRET --with-decryption --query Parameter.Value --output text) >> .env",
                "echo REDIS_HOST=$(aws ssm get-parameter --name /todoapp/REDIS_HOST --with-decryption --query Parameter.Value --output text) >> .env",
                "echo REFRESH_EXPIRE=$(aws ssm get-parameter --name /todoapp/REFRESH_EXPIRE --with-decryption --query Parameter.Value --output text) >> .env",
                "echo ACCESS_EXPIRE=$(aws ssm get-parameter --name /todoapp/ACCESS_EXPIRE --with-decryption --query Parameter.Value --output text) >> .env",
                "echo AWS_REGION=$(aws ssm get-parameter --name /todoapp/AWS_REGION --with-decryption --query Parameter.Value --output text) >> .env",

                "echo TAG=${{ github.sha }} >> .env",

                "docker compose down --remove-orphans",

                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com && docker compose pull && docker compose up -d"
              ]
            }'