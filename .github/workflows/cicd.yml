      #     vuln-type: 'os,library'
      #     severity: 'CRITICAL,HIGH'

      # - name: Scan nginx image
      #   uses: aquasecurity/trivy-action@0.20.0
      #   with:
      #     image-ref: nginx-test:${{ github.sha }}
      #     format: table
      #     exit-code: 1
      #     ignore-unfixed: true
      #     vuln-type: 'os,library'
      #     severity: 'CRITICAL,HIGH'

  cd:
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      #  OIDC
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActions
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Test AWS identity
        run: aws sts get-caller-identity

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      #  Build & Push backend
      - name: Build & Push backend
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/awstodo-backend
          docker build -t $IMAGE:${{ github.sha }} ./backend
          docker push $IMAGE:${{ github.sha }}

      #  Build & Push nginx
      - name: Build & Push nginx
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/awstodo-nginx
          docker build -t $IMAGE:${{ github.sha }} ./frontend
          docker push $IMAGE:${{ github.sha }}

      #  Upload docker-compose (version + latest)
      - name: Upload compose to S3 (versioned)
        run: |
          BUCKET=${{ secrets.S3_BUCKET }}

          aws s3 cp docker-compose.yml \
            s3://$BUCKET/deploy/docker-compose-${{ github.sha }}.yml

          aws s3 cp docker-compose.yml \
            s3://$BUCKET/deploy/docker-compose.yml
      - name: Capture Current Tag for Rollback
        id: prev_info
        run: |
          # 1. Gửi lệnh hỏi trực tiếp Docker
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.WEBSERVER1ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands": ["docker ps --format \"{{.Image}}\" | grep backend | cut -d: -f2 || echo \"latest\""]}' \
            --query "Command.CommandId" --output text)
          
          echo "Waiting for SSM to finish..."
          sleep 7 # Tăng lên 7s cho chắc chắn
          
          # 2. Lấy kết quả
          PREV_TAG=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.WEBSERVER1ID }} \
            --query "StandardOutputContent" --output text | tr -d '\r\n ')

          # Làm sạch kết quả (loại bỏ khoảng trắng)
          PREV_TAG=$(echo $PREV_TAG | xargs)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "None" ]; then
            PREV_TAG="latest"
          fi
          
          echo "PREVIOUS_TAG=$PREV_TAG" >> $GITHUB_ENV
          echo "Detected previous tag: $PREV_TAG"
      # Deploy via SSM
      - name: Deploy to Webservers via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.WEBSERVER1ID }}" "${{ secrets.WEBSERVER2ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy version ${{ github.sha }}" \
            --parameters '{
              "commands": [
                "set -e",
                "export HOME=/home/ec2-user",
                "cd /home/ec2-user/AWStodo",
                "aws s3 cp s3://${{ secrets.S3_BUCKET }}/deploy/docker-compose.yml .",
                "aws ssm get-parameters-by-path --path \"/todoapp/\" --with-decryption --query \"Parameters[*].[Name,Value]\" --output text | sed \"s|^/todoapp/||\" | awk '\''{print $1 \"=\" $2}'\'' > .env",
                "echo \"TAG=${{ github.sha }}\" >> .env",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com",
                "docker compose pull",
                "docker compose up -d --remove-orphans",
                "docker image prune -f",
                "rm .env"
              ]
            }'
      - name: Health Check and Rollback
        run: |
          READINESS_URL="http://${{ secrets.LB_DNS }}/health/db"
          LIVENESS_URL="http://${{ secrets.LB_DNS }}/health"

          sleep 20

          check_health() {
            local readiness_url=$1
            local liveness_url=$2
            local label=$3
            echo "Checking $label..."
            for i in $(seq 1 8); do
              STATUS_READY=$(curl -s -o /dev/null -w "%{http_code}" "$readiness_url")
              BODY_READY=$(curl -s --max-time 5 "$readiness_url")
              STATUS_LIVE=$(curl -s -o /dev/null -w "%{http_code}" "$liveness_url")
              BODY_LIVE=$(curl -s --max-time 5 "$liveness_url")
              
              echo "Attempt $i: READY=$STATUS_READY, LIVE=$STATUS_LIVE"

              if [ "$STATUS_READY" = "200" ] && echo "$BODY_READY" | grep -q '"status":"OK"' && [ "$STATUS_LIVE" = "200" ] && echo "$BODY_LIVE" | grep -q "OK"; then
                echo "$label is Healthy!"
                return 0
              fi
              sleep 10
            done
            return 1
          }

          if check_health "$READINESS_URL" "$LIVENESS_URL" "NEW VERSION"; then
            echo "Deployment Successful!"
            exit 0
          else
            echo "New version failed! Triggering rollback..."

            aws ssm send-command \
              --instance-ids "${{ secrets.WEBSERVER1ID }}" "${{ secrets.WEBSERVER2ID }}" \
              --document-name "AWS-RunShellScript" \
              --parameters "commands=[
                \"set -ex\",
                \"cd /home/ec2-user/AWStodo\",
                \"aws s3 cp s3://${{ secrets.S3_BUCKET }}/deploy/docker-compose-${{ env.PREVIOUS_TAG }}.yml docker-compose.yml\",
                \"aws ssm get-parameters-by-path --path /todoapp/ --with-decryption --query 'Parameters[*].[Name,Value]' --output text | sed 's|^/todoapp/||' | sed 's|\\\\t|=|' > .env\",
                \"echo TAG=${{ env.PREVIOUS_TAG }} >> .env\",
                \"docker compose up -d --remove-orphans\",
                \"sleep 10\",
                \"rm -f .env\"
              ]"

            echo "Waiting 10s..."
            sleep 10

            if check_health "$READINESS_URL" "$LIVENESS_URL" "PREVIOUS VERSION"; then
              echo "Rollback success"
              exit 1
            else
              echo "CRITICAL: Rollback failed"
              exit 1
            fi
          fi